name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Menggunakan versi 18 sesuai file lamamu[cite: 1]

      - name: Install dependencies
        run: npm ci # Menjalankan install sesuai file lamamu[cite: 1]

      - name: Build
        run: npm run build # Menjalankan build sesuai file lamamu[cite: 1]

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Mengambil hasil build dari folder dist[cite: 1]

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4